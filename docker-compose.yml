services:
  # ─── MySQL 8 ───────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: congress_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: peerreview
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppass
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpass"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ─── Backend Node.js + Express + Prisma ────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: congress_backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: mysql://root:rootpass@mysql:3306/peerreview
      JWT_SECRET: congress_jwt_secret_change_in_production_32chars
      PORT: 3000
      NODE_ENV: development
      UPLOADS_DIR: /app/uploads
      FRONTEND_URL: http://localhost:5173
    volumes:
      - ./backend:/app
      - /app/node_modules
      - uploads_data:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app-net
    command: >
      sh -c "npx prisma migrate deploy && npx prisma generate && node src/server.js"
  
  # ─── Frontend Vue 3 + Vite PWA ─────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: congress_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3000/api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - app-net

networks:
  app-net:
    driver: bridge

volumes:
  mysql_data:
  uploads_data:
