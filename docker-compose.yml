
services:
  backend:
    build: .
    container_name: peer_review_backend
    ports:
      - "3000:3000"
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    command: npm run start:backend
    env_file:
      - ./backend/.env
    environment:
      - PORT=3000

  frontend:
    build: .
    container_name: peer_review_frontend
    ports:
      - "5173:5173"
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    # El flag --host es importante en Vite para que permita conexiones externas al contenedor
    command: npm run dev -- --host 0.0.0.0
    environment:
      - VITE_PORT=5173
      - BACKEND_URL=http://backend:3000
    depends_on:
      - backend

volumes:
  mongo_data:
