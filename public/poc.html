<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PoC - Arquitectura PeerReview</title>
</head>
<body style="font-family: Arial; padding: 20px;">
    <h2>Prueba de Concepto - Arquitectura Cliente/Servidor + JWT</h2>
    
    <div style="border: 1px solid #ccc; padding: 15px; margin-bottom: 20px;">
        <h3>1. Iniciar Sesión</h3>
        <button onclick="hacerLogin()">Login (autor1 / 1234)</button>
        <p id="token-status" style="color: blue;"></p>
    </div>

    <div style="border: 1px solid #ccc; padding: 15px;">
        <h3>2. Pedir Datos Seguros al Servidor</h3>
        <button onclick="pedirDatosProtegidos()">Obtener Artículos</button>
        <p id="datos-status" style="color: green;"></p>
    </div>

    <script>
        async function hacerLogin() {
            const respuesta = await fetch('http://localhost:3000/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: "autor1", password: "1234" })
            });
            const data = await respuesta.json();
            
            if (data.token) {
                // Demuestra el almacenamiento seguro en el cliente
                localStorage.setItem('jwt_token', data.token);
                document.getElementById('token-status').innerText = "¡Token recibido y guardado en localStorage!";
            }
        }

        async function pedirDatosProtegidos() {
            const token = localStorage.getItem('jwt_token');
            const respuesta = await fetch('http://localhost:3000/api/articulos-protegidos', {
                headers: { 'Authorization': token } // Enviamos el token al backend
            });
            const data = await respuesta.json();
            
            document.getElementById('datos-status').innerText = JSON.stringify(data);
        }
    </script>
</body>
</html>
